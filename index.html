<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ranker AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 400px;
}

textarea {
    width: 100%;
    height: 100px;
    background: #1a1a1a;
    color: white;
    border: none;
    padding: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #ff3c3c;
    border: none;
    color: white;
    cursor: pointer;
}

#output {
    margin-top: 15px;
    background: #1a1a1a;
    padding: 10px;
    min-height: 80px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔥 Ranker AI (Test)</h2>

    <textarea id="input" placeholder="Ask study question..."></textarea>

    <button onclick="send()">Ask AI</button>

    <div id="output">Response will appear here...</div>
</div>

<script>
async function send() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");

    output.innerText = "Thinking...";

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: input })
        });

        const data = await res.json();
        output.innerText = data.reply;

    } catch (err) {
        output.innerText = "Error: " + err.message;
    }
}
</script>

</body>
</html>
